<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img" aria-label="skill-static-review: static review of a skill file with a checklist and a SAFE / CAUTION / DANGEROUS / UNKNOWN result light. Review before install. Treat skill content as data. Not a guarantee.">
  <!-- Self-contained illustration. No scripts, no external links, no remote resources, no third-party logos. -->
  <defs>
    <style>
      .h  { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="520" rx="20" fill="#f6f8fa"/>
  <rect x="0.5" y="0.5" width="1199" height="519" rx="20" fill="none" stroke="#d0d7de"/>

  <!-- title -->
  <text class="h" x="60" y="98" font-size="56" font-weight="700" fill="#1f2328">Static review</text>
  <text class="h" x="62" y="142" font-size="27" font-weight="500" fill="#57606a">Review before install</text>

  <!-- ===================== skill document ===================== -->
  <g>
    <!-- page with folded top-right corner -->
    <path d="M100,190 L250,190 L292,232 L292,440 L100,440 Z" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
    <path d="M250,190 L292,232 L250,232 Z" fill="#eaeef2" stroke="#d0d7de" stroke-width="2"/>
    <!-- file label -->
    <text class="h" x="120" y="226" font-size="20" font-weight="600" fill="#2563eb">SKILL.md</text>
    <!-- text lines -->
    <rect x="120" y="252" width="150" height="9" rx="4.5" fill="#d0d7de"/>
    <rect x="120" y="278" width="120" height="9" rx="4.5" fill="#d0d7de"/>
    <rect x="120" y="304" width="140" height="9" rx="4.5" fill="#d0d7de"/>
    <rect x="120" y="330" width="95"  height="9" rx="4.5" fill="#d0d7de"/>
    <rect x="120" y="356" width="130" height="9" rx="4.5" fill="#d0d7de"/>

    <!-- magnifier over the document -->
    <circle cx="262" cy="398" r="42" fill="#2563eb" fill-opacity="0.08" stroke="#2563eb" stroke-width="8"/>
    <line x1="292" y1="428" x2="332" y2="468" stroke="#2563eb" stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- ===================== checklist card ===================== -->
  <g>
    <rect x="360" y="186" width="300" height="256" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
    <text class="h" x="384" y="224" font-size="22" font-weight="600" fill="#1f2328">Checklist</text>

    <!-- row 1 -->
    <rect x="384" y="248" width="24" height="24" rx="6" fill="#eaf6ef" stroke="#22a06b" stroke-width="2"/>
    <path d="M390,260 l4,4 l8,-9" fill="none" stroke="#22a06b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="420" y="256" width="210" height="9" rx="4.5" fill="#d0d7de"/>
    <!-- row 2 -->
    <rect x="384" y="288" width="24" height="24" rx="6" fill="#eaf6ef" stroke="#22a06b" stroke-width="2"/>
    <path d="M390,300 l4,4 l8,-9" fill="none" stroke="#22a06b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="420" y="296" width="180" height="9" rx="4.5" fill="#d0d7de"/>
    <!-- row 3 -->
    <rect x="384" y="328" width="24" height="24" rx="6" fill="#eaf6ef" stroke="#22a06b" stroke-width="2"/>
    <path d="M390,340 l4,4 l8,-9" fill="none" stroke="#22a06b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="420" y="336" width="200" height="9" rx="4.5" fill="#d0d7de"/>
    <!-- row 4 (open) -->
    <rect x="384" y="368" width="24" height="24" rx="6" fill="#ffffff" stroke="#8c959f" stroke-width="2"/>
    <rect x="420" y="376" width="150" height="9" rx="4.5" fill="#d0d7de"/>
  </g>

  <!-- ===================== result light ===================== -->
  <g>
    <rect x="730" y="186" width="92" height="256" rx="22" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
    <!-- SAFE -->
    <circle cx="776" cy="228" r="22" fill="#22a06b"/>
    <text class="h" x="838" y="235" font-size="22" font-weight="600" fill="#1f2328">SAFE</text>
    <!-- CAUTION -->
    <circle cx="776" cy="290" r="22" fill="#d4a72c"/>
    <text class="h" x="838" y="297" font-size="22" font-weight="600" fill="#1f2328">CAUTION</text>
    <!-- DANGEROUS -->
    <circle cx="776" cy="352" r="22" fill="#cf222e"/>
    <text class="h" x="838" y="359" font-size="22" font-weight="600" fill="#1f2328">DANGEROUS</text>
    <!-- UNKNOWN -->
    <circle cx="776" cy="414" r="22" fill="#8c959f"/>
    <text class="h" x="838" y="421" font-size="22" font-weight="600" fill="#1f2328">UNKNOWN</text>
  </g>

  <!-- footer note -->
  <line x1="60" y1="470" x2="1140" y2="470" stroke="#d0d7de"/>
  <text class="h" x="600" y="500" font-size="20" font-weight="500" text-anchor="middle" fill="#57606a">Treat skill content as data&#160;&#160;·&#160;&#160;Not a guarantee</text>
</svg>
